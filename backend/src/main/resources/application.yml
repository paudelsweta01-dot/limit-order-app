spring:
  application:
    name: lob-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lob}
    username: ${SPRING_DATASOURCE_USERNAME:lob}
    password: ${SPRING_DATASOURCE_PASSWORD:lob}
    hikari:
      pool-name: lob-hikari
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Plan §10.2 — BigDecimal must serialise as a plain decimal string on
  # the wire, never scientific notation. Without this, a price of
  # 1_000_000.0000 would round-trip as 1.0E+6 and the simulator's
  # numeric-string comparator would still pass, but a human reading
  # `/api/orders/mine` would see surprise notation. Belt-and-braces.
  jackson:
    generator:
      write-bigdecimal-as-plain: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always       # OutboxListener health component visible without auth
      show-components: always
      probes:
        enabled: true
  metrics:
    tags:
      instance: ${app.instance-id}

app:
  instance-id: ${INSTANCE_ID:backend-local}
  outbox:
    retention-minutes: ${OUTBOX_RETENTION_MINUTES:5}
  jwt:
    signing-secret: ${JWT_SIGNING_SECRET:change-me-please-use-a-real-256-bit-secret-in-deployment}
    ttl-minutes: 720

logging:
  level:
    root: INFO
    com.sweta.limitorder: DEBUG
