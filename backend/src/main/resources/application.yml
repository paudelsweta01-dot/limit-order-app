spring:
  application:
    name: lob-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lob}
    username: ${SPRING_DATASOURCE_USERNAME:lob}
    password: ${SPRING_DATASOURCE_PASSWORD:lob}
    hikari:
      pool-name: lob-hikari
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      instance: ${app.instance-id}

app:
  instance-id: ${INSTANCE_ID:backend-local}
  outbox:
    retention-minutes: ${OUTBOX_RETENTION_MINUTES:5}
  jwt:
    signing-secret: ${JWT_SIGNING_SECRET:change-me-please-use-a-real-256-bit-secret-in-deployment}
    ttl-minutes: 720

logging:
  level:
    root: INFO
    com.example.lob: DEBUG
