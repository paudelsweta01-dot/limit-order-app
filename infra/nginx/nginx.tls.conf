# Plan §9.1 — TLS-aware nginx config. Used only when the optional
# infra/tls/docker-compose.tls.yml overlay is loaded; the default stack
# uses infra/nginx/nginx.conf (port 80 only).
#
# This file is a strict superset of nginx.conf — same upstream backends,
# same locations, same rate-limit zone — plus:
#   - port 443 listener with the mkcert-generated cert
#   - port 80 listener that 301-redirects to 443
#
# Acceptance: `https://localhost/` works in the browser without warnings
# after `make tls-setup` (which runs mkcert -install).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format lb '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" upstream=$upstream_addr '
                  'rt=$request_time uct=$upstream_connect_time '
                  'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log lb;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Plan §9.2 — login rate limit (same zone as the non-TLS variant).
    limit_req_zone $binary_remote_addr zone=login:1m rate=5r/m;

    upstream backend {
        server backend-1:8080;
        server backend-2:8080;
    }
    upstream frontend {
        server frontend:80;
    }

    # Plan §9.1 — port 80 redirects to 443 so any plaintext probe (or a
    # bookmark from before TLS was enabled) is upgraded automatically.
    # /actuator/health stays plaintext-accessible so docker compose
    # healthchecks still work without trusting the local CA inside
    # alpine images.
    server {
        listen 80;
        server_name _;

        location /actuator/health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Mounted into the container by the TLS overlay compose file.
        ssl_certificate     /etc/nginx/tls/localhost.pem;
        ssl_certificate_key /etc/nginx/tls/localhost-key.pem;

        # Modern-only TLS — mkcert-issued certs are RSA 2048 by default.
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:1m;
        ssl_session_timeout 10m;

        location = /api/auth/login {
            limit_req zone=login burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/orders {
            client_max_body_size 16k;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WSS — same upgrade headers as the ws/ block in nginx.conf.
        # Browser opens `wss://localhost/ws/...` and TLS is terminated
        # here; backend gets plain WebSocket on the docker network.
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
