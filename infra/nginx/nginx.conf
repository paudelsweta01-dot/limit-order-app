# Top-level nginx config for the API + WebSocket LB. Mounted by compose
# at /etc/nginx/nginx.conf:ro (replaces the upstream's default).
#
# DESIGN NOTES (architecture §4.7 / §5.4 / plan §3):
#   - Round-robin across both backends. NO ip_hash, NO sticky cookies.
#     The architecture's outbox + LISTEN/NOTIFY fan-out gives us cross-
#     node consistency without session affinity, and forcing every
#     client to bounce between nodes is what proves the multi-instance
#     NFR on every request.
#   - WebSocket upgrade headers must be exactly right. nginx silently
#     drops Upgrade / Connection on hop-by-hop forwarding unless we
#     re-set them — which is the most common reason a WS proxy "just
#     hangs" during the handshake.
#   - Order matters: the `location /api/orders` block is more specific
#     than `/api/` and so wins under nginx's longest-prefix match. The
#     16k body cap (plan §3.6) is therefore scoped to order submission,
#     where the body is tiny by design.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Plan §3.7: include $upstream_addr so we can read off which backend
    # served each request from the access log alone — invaluable when
    # debugging a "did the LB actually rotate?" question without
    # cracking open MDC fields. `$request_time` and `$upstream_response_time`
    # are added cheaply and tell us where latency is living.
    log_format lb '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" upstream=$upstream_addr '
                  'rt=$request_time uct=$upstream_connect_time '
                  'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log lb;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Plan §9.2 — rate limit on /api/auth/login. 5 req/min/IP throttles
    # brute-force without locking out humans (the reviewer demoing four
    # seed users back-to-back lands well inside this window). The zone
    # is sized for ~10 000 distinct client IPs (1 MiB ≈ 16 KiB headers
    # × 16 keys/KiB), which is more than enough for a developer laptop.
    limit_req_zone $binary_remote_addr zone=login:1m rate=5r/m;

    # Plan §3.2: explicit round-robin (the default) over both backends.
    # No `ip_hash`, no `sticky cookie` directive. The downstream LISTEN/
    # NOTIFY plumbing makes session affinity unnecessary and rotating
    # nodes per request stresses the multi-instance design on every
    # call (architecture §4.7).
    upstream backend {
        server backend-1:8080;
        server backend-2:8080;
    }

    # SPA static bundle — served by the frontend container. The LB
    # proxies / to it so the SPA and API share the same origin (port
    # 80), which is what the prod build assumes (apiBaseUrl=""). Without
    # this, the SPA loaded from :4200 would POST to :4200/api/... and
    # hit the static-file server's 405 (no /api/ route, fallback to
    # /index.html, POST not allowed on static files).
    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # Plan §3.5: read-only health probe so an external watcher
        # (compose, k8s, a reviewer's `curl http://localhost/actuator/health`)
        # can tell whether at least one backend is up. Round-robin means
        # successive probes report each backend's instance field in
        # turn, which is the simplest LB-rotation smoke test.
        location /actuator/health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Plan §9.2: rate-limited login endpoint. 5 req/min/IP, with a
        # tiny burst=2 to absorb transient retries (a fat-fingered
        # password followed by the correct one). Excess requests get
        # 429 with the §4.11 envelope shape (Spring Security's default
        # 401 stops mattering once nginx has rejected it earlier).
        # Order matters: this longest-match block fires for /api/auth/login
        # before the broader /api/ catch-all below.
        location = /api/auth/login {
            limit_req zone=login burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Plan §3.6: order submission has tiny request bodies (a single
        # JSON object, ~150 bytes). 16k caps `/api/orders` only — the
        # other `/api/*` endpoints retain the default 1 MB limit so
        # future bulk-action endpoints aren't accidentally throttled.
        # Longest-prefix wins, so this block fires for /api/orders and
        # /api/orders/{id} but NOT for /api/auth/login etc.
        location /api/orders {
            client_max_body_size 16k;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Plan §3.3: catch-all for the rest of the REST surface.
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Plan §3.4: WebSocket upgrade. The four upgrade-related headers
        # below are the ones nginx silently strips on hop-by-hop
        # forwarding by default — re-setting them is what makes the
        # handshake go through. The 3600s read/send timeouts mean an
        # idle-but-open socket (e.g. a thinly traded symbol's book
        # channel between bursts) doesn't get killed by the LB.
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SPA shell + hashed asset bundle. Catch-all so / and any
        # client-side route (e.g. /symbol/AAPL refresh) reach the
        # frontend container's nginx, which has the SPA fallback
        # `try_files $uri $uri/ /index.html`. The /api/ and /ws/
        # locations above match first via nginx's longest-prefix rule,
        # so backend traffic isn't routed here.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
