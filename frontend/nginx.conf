# Server block for the static-SPA container (separate from the API LB
# in `infra/nginx/nginx.conf`). Mounted at /etc/nginx/conf.d/default.conf.
#
# Two responsibilities only:
#   1. SPA routing — every unmatched URL falls through to /index.html so
#      the Angular Router can take over (visiting /symbol/AAPL directly
#      must not 404).
#   2. gzip + sensible caching for static assets.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- cache headers ----
    # Hashed asset filenames (`main-H7HV53CZ.js`) — safe to cache hard.
    location ~* \.(?:js|css|woff2?|svg|png|jpe?g|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached so a fresh deploy is picked up
    # immediately (the hashed JS/CSS it references will then be too).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
